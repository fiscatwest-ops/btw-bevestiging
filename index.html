<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTW Documenten Bevestiging - Fisc@West</title>
    <style>
        /* Fisc@West Huisstijl */
        :root {
            --fw-donkerblauw: #1a365d;
            --fw-oranje: #c05621;
            --fw-links: #2c5282;
            --fw-grijs-bg: #f7fafc;
            --fw-groen-bg: #f0fff4;
            --fw-geel-bg: #fffbeb;
            --fw-subtitel: #666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 15px;
            background: linear-gradient(135deg, var(--fw-donkerblauw) 0%, #2c5282 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: var(--fw-donkerblauw);
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom: 4px solid var(--fw-oranje);
        }

        .header h1 {
            font-family: Georgia, serif;
            font-size: 26px;
            margin-bottom: 5px;
            font-weight: normal;
        }

        .header p {
            opacity: 0.9;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-family: Georgia, serif;
            font-weight: bold;
            font-size: 16px;
            color: var(--fw-donkerblauw);
        }

        .required::after {
            content: ' *';
            color: var(--fw-oranje);
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--fw-donkerblauw);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--fw-oranje);
        }

        .checkbox-group label {
            margin: 0;
            font-weight: normal;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 15px;
            cursor: pointer;
        }

        .upload-zone {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--fw-grijs-bg);
        }

        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: var(--fw-oranje);
            background: var(--fw-geel-bg);
        }

        .upload-zone svg {
            width: 48px;
            height: 48px;
            margin-bottom: 10px;
            color: var(--fw-donkerblauw);
        }

        .file-list {
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: var(--fw-grijs-bg);
            border-left: 3px solid var(--fw-oranje);
            border-radius: 0 6px 6px 0;
            margin-bottom: 8px;
        }

        .file-item .name {
            font-size: 14px;
            color: var(--fw-donkerblauw);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 300px;
        }

        .file-item .remove {
            background: var(--fw-oranje);
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
        }

        .file-item .remove:hover {
            background: #a04518;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--fw-oranje);
            color: white;
        }

        .btn-primary:hover {
            background: #a04518;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(192, 86, 33, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }

        .status.success {
            background: var(--fw-groen-bg);
            border-left: 4px solid #38a169;
            color: #276749;
            display: block;
            text-align: left;
        }

        .status.error {
            background: #fed7d7;
            border-left: 4px solid #c53030;
            color: #c53030;
            display: block;
            text-align: left;
        }

        .status.loading {
            background: var(--fw-geel-bg);
            border-left: 4px solid var(--fw-oranje);
            color: #744210;
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--fw-oranje);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-box {
            background: var(--fw-grijs-bg);
            border-left: 4px solid var(--fw-oranje);
            padding: 12px 15px;
            margin-bottom: 20px;
            border-radius: 0 6px 6px 0;
            font-size: 14px;
            color: var(--fw-donkerblauw);
            font-style: italic;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: var(--fw-grijs-bg);
            border-top: 1px solid #e2e8f0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--fw-subtitel);
        }

        .footer a {
            color: var(--fw-links);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--fw-donkerblauw);
        }

        .recaptcha-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
    </style>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 BTW Documenten Bevestiging</h1>
            <p>Fisc@West BV</p>
        </div>

        <div class="content">
            <div class="info-box">
                Bevestig dat u alle nodige documenten heeft opgeladen voor uw BTW-aangifte. 
                U kunt hieronder ook extra documenten toevoegen.
            </div>

            <form id="confirmForm">
                <div class="form-group">
                    <label for="vatNumber" class="required">BTW-nummer</label>
                    <input type="text" id="vatNumber" name="vatNumber" 
                           placeholder="BE 0123.456.789" required>
                </div>

                <div class="form-group">
                    <label for="clientEmail">Uw e-mailadres</label>
                    <input type="email" id="clientEmail" name="clientEmail" 
                           placeholder="uw.email@voorbeeld.be">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="sendCopy" name="sendCopy">
                    <label for="sendCopy">Stuur mij een bevestiging per e-mail</label>
                </div>

                <div class="form-group">
                    <label for="clientRemark">Opmerking (optioneel)</label>
                    <textarea id="clientRemark" name="clientRemark" rows="3"
                              placeholder="Eventuele opmerkingen of vragen..."></textarea>
                </div>

                <div class="form-group">
                    <label>Documenten toevoegen (optioneel)</label>
                    <div class="upload-zone" id="uploadZone">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                        <p>Klik of sleep bestanden hierheen</p>
                        <p style="font-size: 0.8rem; color: #7f8c8d;">Max 10 bestanden, elk max 10MB</p>
                    </div>
                    <input type="file" id="fileInput" multiple hidden>
                    <div class="file-list" id="fileList"></div>
                </div>

                <div class="form-group recaptcha-container">
                    <div class="g-recaptcha" data-sitekey="6Ld9cFksAAAAAPAvlhk9kRFWANwvAvHa3pm-ORSJ"></div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    ✓ Bevestigen
                </button>

                <div class="status" id="status"></div>
            </form>
        </div>

        <div class="footer">
            <p>Fisc@West BV | BE 0562.845.171</p>
            <p><a href="https://fiscatwest.be">www.fiscatwest.be</a></p>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_URL: '/api/confirm-btw',
            CLOUDINARY_CLOUD_NAME: 'dssqewl7x',
            CLOUDINARY_UPLOAD_PRESET: 'btw-bevestiging',
            MAX_FILES: 10,
            MAX_FILE_SIZE: 10 * 1024 * 1024
        };

        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const form = document.getElementById('confirmForm');
        const submitBtn = document.getElementById('submitBtn');
        const status = document.getElementById('status');

        let uploadedFiles = [];

        // Pre-fill VAT from URL params
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('vat')) {
            document.getElementById('vatNumber').value = urlParams.get('vat');
        }
        if (urlParams.get('email')) {
            document.getElementById('clientEmail').value = urlParams.get('email');
        }

        // Upload zone events
        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', () => handleFiles(fileInput.files));

        function handleFiles(files) {
            for (const file of files) {
                if (uploadedFiles.length >= CONFIG.MAX_FILES) {
                    alert(`Maximum ${CONFIG.MAX_FILES} bestanden toegestaan`);
                    break;
                }
                if (file.size > CONFIG.MAX_FILE_SIZE) {
                    alert(`${file.name} is te groot (max 10MB)`);
                    continue;
                }
                uploadedFiles.push({ file, status: 'pending', url: null, name: file.name });
            }
            renderFileList();
        }

        function renderFileList() {
            fileList.innerHTML = uploadedFiles.map((f, i) => `
                <div class="file-item">
                    <span class="name">${f.status === 'uploading' ? '⏳' : f.status === 'done' ? '✓' : '○'} ${f.name}</span>
                    <button type="button" class="remove" onclick="removeFile(${i})">×</button>
                </div>
            `).join('');
        }

        function removeFile(index) {
            uploadedFiles.splice(index, 1);
            renderFileList();
        }

        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CONFIG.CLOUDINARY_UPLOAD_PRESET);
            formData.append('folder', 'btw-bevestiging');

            const res = await fetch(
                `https://api.cloudinary.com/v1_1/${CONFIG.CLOUDINARY_CLOUD_NAME}/auto/upload`,
                { method: 'POST', body: formData }
            );

            if (!res.ok) throw new Error('Upload failed');
            return res.json();
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const vatNumber = document.getElementById('vatNumber').value;
            const clientEmail = document.getElementById('clientEmail').value;
            const sendCopy = document.getElementById('sendCopy').checked;
            const clientRemark = document.getElementById('clientRemark').value;
            const recaptchaResponse = grecaptcha.getResponse();

            if (!vatNumber) {
                showStatus('error', 'Vul uw BTW-nummer in');
                return;
            }

            if (sendCopy && !clientEmail) {
                showStatus('error', 'Vul uw e-mailadres in om een bevestiging te ontvangen');
                return;
            }

            if (!recaptchaResponse) {
                showStatus('error', 'Bevestig dat u geen robot bent');
                return;
            }

            submitBtn.disabled = true;
            showStatus('loading', '<span class="spinner"></span>Bezig met verwerken...');

            try {
                // Upload files to Cloudinary
                const cloudinaryResults = [];
                for (let i = 0; i < uploadedFiles.length; i++) {
                    if (uploadedFiles[i].status !== 'done') {
                        uploadedFiles[i].status = 'uploading';
                        renderFileList();
                        
                        const result = await uploadToCloudinary(uploadedFiles[i].file);
                        uploadedFiles[i].status = 'done';
                        uploadedFiles[i].url = fixedUrl;
const fixedUrl = result.secure_url.replace('/image/upload/', '/raw/upload/');
                        cloudinaryResults.push({
                            name: uploadedFiles[i].name,
                            url: fixedUrl
                        });
                        renderFileList();
                    }
                }

                // Send confirmation to API
                const response = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        vatNumber,
                        clientEmail,
                        sendCopy,
                        clientRemark,
                        recaptchaToken: recaptchaResponse,
                        uploadedFiles: cloudinaryResults
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showStatus('success', `
                        <strong>✓ Bevestiging ontvangen!</strong><br>
                        Klant: ${data.relation}<br>
                        Taak: ${data.task}<br>
                        ${data.filesCount > 0 ? `Bestanden: ${data.filesCount}` : ''}
                        ${sendCopy ? '<br>Een bevestiging is naar uw e-mail verzonden.' : ''}
                    `);
                    form.reset();
                    uploadedFiles = [];
                    renderFileList();
                    grecaptcha.reset();
                } else {
                    throw new Error(data.error || 'Onbekende fout');
                }

            } catch (error) {
                console.error('Error:', error);
                showStatus('error', `Fout: ${error.message}`);
            } finally {
                submitBtn.disabled = false;
            }
        });

        function showStatus(type, message) {
            status.className = `status ${type}`;
            status.innerHTML = message;
        }
    </script>
</body>
</html>
